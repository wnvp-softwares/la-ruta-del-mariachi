<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocula Pueblo Mágico</title>
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>

    <div class="phone-container">
        <section class="hero">
            <img src="images/fondo.png" alt="Cocula Banner" class="hero-img">
            <img src="images/logo.png" alt="Pueblo Mágico" class="logo">
        </section>

        <section class="main-content">
            <div class="decor-left-side">
                <img src="images/guitarra.png" class="decor" alt="Guitarra">
                <img src="images/trompeta.png" class="decor" alt="Trompeta">
                <img src="images/violin.png" class="decor" alt="Violín">
            </div>

            <div class="center-content">
                <div class="pin">
                    <img src="images/pin.png" alt="Ruta del Mariachi">
                </div>

                <h1>Explora nuestro<br>pueblo mágico</h1>

                <div class="buttons">
                    <a href="#" class="btn android">
                        Disponible en Google Play
                    </a>
                    <a href="#" class="btn ios">
                        Descargar en App Store
                    </a>
                </div>
            </div>
            <div class="decor-right-side">
                <img src="images/violin.png" class="decor" alt="Violín">
                <img src="images/guitarra.png" class="decor" alt="Guitarra">
                <img src="images/trompeta.png" class="decor" alt="Trompeta">
            </div>
        </section>
        <footer>
            <p>Derechos reservados 2025</p>
        </footer>
    </div>
    <script src="../scripts/script.js"></script>
</body>
</html>
